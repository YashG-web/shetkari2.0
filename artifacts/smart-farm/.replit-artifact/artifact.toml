kind = "web"
previewPath = "/"
title = "Smart Farming App"
version = "1.0.0"
id = "artifacts/smart-farm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18192

[services.development]
run = "pnpm --filter @workspace/smart-farm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-farm", "run", "build" ]
publicDir = "artifacts/smart-farm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18192"
BASE_PATH = "/"
