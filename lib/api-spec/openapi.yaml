openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Farming API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sensor
    description: IoT sensor data
  - name: weather
    description: Weather data and alerts
  - name: recommendation
    description: Crop recommendations
  - name: simulator
    description: Smart farming simulation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /predict-moisture:
    get:
      operationId: predictMoisture
      tags: [sensor]
      summary: Predict future soil moisture (LSTM)
      description: Returns a predicted soil moisture value using the LSTM model.
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  predictedMoisture: { type: number, nullable: true }
                  timestamp: { type: string }
                required: [status]

  /predict/soil-moisture:
    post:
      operationId: predictSoilMoistureTree
      tags: [sensor]
      summary: Predict next-step soil moisture (Decision Tree/Random Forest)
      parameters:
        - name: model_type
          in: query
          required: false
          schema:
            type: string
            enum: [decision_tree, random_forest]
            default: random_forest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                temperature: { type: number }
                humidity: { type: number }
                rain: { type: integer }
                prev_moisture: { type: number }
              required: [temperature, humidity, rain, prev_moisture]
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  predictedMoisture: { type: number }
                  status: { type: string }
                required: [predictedMoisture, status]

  /predict/forecast:
    post:
      operationId: predictForecast
      tags: [sensor]
      summary: Forecast next value in sequence (Time Series)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lags:
                  type: array
                  items: { type: number }
                  minItems: 3
                  maxItems: 3
              required: [lags]
      responses:
        "200":
          description: Forecast result
          content:
            application/json:
              schema:
                type: object
                properties:
                  forecast: { type: number }
                  status: { type: string }
                required: [forecast, status]


  /sensor-data:
    get:
      operationId: getSensorData
      tags: [sensor]
      summary: Get latest IoT sensor readings
      description: Returns simulated real-time sensor data
      responses:
        "200":
          description: Sensor data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorData"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get weather data and alerts
      description: Returns current weather conditions and active alerts
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherData"

  /recommendation:
    get:
      operationId: getRecommendation
      tags: [recommendation]
      summary: Get crop recommendations
      description: Returns crop health summary, issues, and suggested actions
      responses:
        "200":
          description: Crop recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationData"

  /simulator/config:
    get:
      operationId: getSimulatorConfig
      tags: [simulator]
      summary: Get simulator configuration
      responses:
        "200":
          description: Simulator configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorConfig"
    post:
      operationId: updateSimulatorConfig
      tags: [simulator]
      summary: Update simulator configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulatorConfig"
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorConfig"

  /simulator/latest:
    get:
      operationId: getLatestSimulatorData
      tags: [simulator]
      summary: Get latest simulated data point
      responses:
        "200":
          description: Latest simulator data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorData"

  /simulator/bulk:
    post:
      operationId: generateBulkData
      tags: [simulator]
      summary: Generate bulk simulated data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                duration:
                  type: string
                  enum: [1-month, 3-months, 6-months, 1-year]
              required: [duration]
      responses:
        "200":
          description: Bulk data generated
          content:
            text/csv:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SensorData:
      type: object
      properties:
        soilMoisture:
          type: number
          description: Soil moisture percentage (0-100)
        temperature:
          type: number
          description: Temperature in Celsius
        humidity:
          type: number
          description: Humidity percentage (0-100)
        nitrogen: { type: number }
        phosphorus: { type: number }
        potassium: { type: number }
        pumpStatus:
          type: string
          enum: [ON, OFF]
        connectedAt: { type: string }
        rfPrediction:
          type: number
          description: Random Forest soil moisture prediction
        dtInsights:
          type: array
          items: { type: string }
          description: Decision Tree explainability reasons
        tsForecastData:
          type: array
          items:
            type: object
            properties:
              time: { type: string }
              value: { type: number }
          description: Time Series future trend data
      required:
        - soilMoisture
        - temperature
        - humidity
        - nitrogen
        - phosphorus
        - potassium
        - pumpStatus
        - connectedAt


    WeatherData:
      type: object
      properties:
        condition:
          type: string
          description: Short weather condition label
        icon:
          type: string
          description: Weather icon identifier
        description:
          type: string
          description: Weather description text
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/WeatherAlert"
      required:
        - condition
        - icon
        - description
        - alerts

    WeatherAlert:
      type: object
      properties:
        type:
          type: string
          enum: [heavy-rain, storm, drought, frost, normal]
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
      required:
        - type
        - message
        - severity

    RecommendationData:
      type: object
      properties:
        cropCondition:
          type: string
          description: Overall crop condition summary
        identifiedIssue:
          type: string
          description: Main issue identified
        riskLevel:
          type: string
          enum: [low, medium, high]
        suggestedActions:
          type: array
          items:
            type: string
          description: List of recommended actions
        fertilizerRecommendation:
          $ref: "#/components/schemas/FertilizerRecommendation"
      required:
        - cropCondition
        - identifiedIssue
        - riskLevel
        - suggestedActions
        - fertilizerRecommendation

    FertilizerRecommendation:
      type: object
      properties:
        name:
          type: string
        npkRatio:
          type: string
          description: NPK ratio e.g. 10-26-26
        usageInfo:
          type: string
        buyLink:
          type: string
          description: External purchase URL
        platform:
          type: string
          description: Platform name e.g. Amazon
      required:
        - name
        - npkRatio
        - usageInfo
        - buyLink
        - platform

    SimulatorConfig:
      type: object
      properties:
        models:
          type: object
          properties:
            lstm: { type: boolean }
            randomForest: { type: boolean }
            regression: { type: boolean }
            ruleEngine: { type: boolean }
          required: [lstm, randomForest, regression, ruleEngine]
        controls:
          type: object
          properties:
            temperature: { type: number }
            humidity: { type: number }
            rain: { type: boolean }
            soilMoisture: { type: number }
            nitrogen: { type: number }
            phosphorus: { type: number }
            potassium: { type: number }
            pH: { type: number }
          required: [temperature, humidity, rain, soilMoisture, nitrogen, phosphorus, potassium, pH]
      required: [models, controls]

    SimulatorData:
      type: object
      properties:
        timestamp: { type: string }
        soilMoisture: { type: number }
        temperature: { type: number }
        humidity: { type: number }
        rain: { type: boolean }
        nitrogen: { type: number }
        phosphorus: { type: number }
        potassium: { type: number }
        pH: { type: number }
        lstmOutput: { type: number }
        rfOutput: { type: string }
        regressionOutput: { type: number }
        ruleEngineOutput: { type: string }
      required: [timestamp, soilMoisture, temperature, humidity, rain, nitrogen, phosphorus, potassium, pH]
